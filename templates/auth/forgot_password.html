{% extends "base.html" %}
{% block title %}Forgot Password — JobFinder{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100 py-5">
      <div class="col-md-5 col-lg-4">

        <div class="text-center mb-4">
          <a href="{{ url_for('main.index') }}" class="auth-logo">
            <i class="fas fa-briefcase me-2"></i>JobFinder
          </a>
          <div class="auth-icon-circle mt-4 mb-3 mx-auto">
            <i class="fas fa-lock-open"></i>
          </div>
          <h2 class="auth-title mt-2">Forgot Password?</h2>
          <p class="text-muted">No worries — enter your email and we'll send you a reset link.</p>
        </div>

        <div class="auth-card card shadow-lg">
          <div class="card-body p-4 p-md-5">
            <form method="POST" action="{{ url_for('auth.forgot_password') }}">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

              <div class="mb-4">
                <label class="form-label fw-medium">Email Address</label>
                <div class="input-group-icon">
                  <i class="fas fa-envelope"></i>
                  <input type="email" name="email" class="form-control form-control-lg"
                         placeholder="you@example.com" required autofocus
                         value="{{ request.form.get('email', '') }}">
                </div>
              </div>

              <button type="submit" class="btn btn-primary btn-lg w-100">
                <i class="fas fa-paper-plane me-2"></i>Send Reset Link
              </button>
            </form>
          </div>
        </div>

        <div class="text-center mt-3">
          <a href="{{ url_for('auth.login') }}" class="text-muted small">
            <i class="fas fa-arrow-left me-1"></i>Back to Login
          </a>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block footer %}{% endblock %}
