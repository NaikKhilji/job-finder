{% extends "base.html" %}
{% block title %}Reset Password — JobFinder{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100 py-5">
      <div class="col-md-5 col-lg-4">

        <div class="text-center mb-4">
          <a href="{{ url_for('main.index') }}" class="auth-logo">
            <i class="fas fa-briefcase me-2"></i>JobFinder
          </a>
          <div class="auth-icon-circle mt-4 mb-3 mx-auto">
            <i class="fas fa-key"></i>
          </div>
          <h2 class="auth-title mt-2">Set New Password</h2>
          {% if user %}
            <p class="text-muted">Resetting password for <strong class="text-white">{{ user.email }}</strong></p>
          {% endif %}
        </div>

        <div class="auth-card card shadow-lg">
          <div class="card-body p-4 p-md-5">
            <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

              <div class="mb-4">
                <label class="form-label fw-medium">New Password</label>
                <div class="input-group-icon">
                  <i class="fas fa-lock"></i>
                  <input type="password" name="password" id="passwordInput"
                         class="form-control form-control-lg"
                         placeholder="Min. 6 characters" required minlength="6" autofocus>
                  <button type="button" class="btn-eye" onclick="togglePassword('passwordInput', this)">
                    <i class="fas fa-eye"></i>
                  </button>
                </div>
                <div class="password-strength mt-2">
                  <div class="strength-bar" id="strengthBar"></div>
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label fw-medium">Confirm New Password</label>
                <div class="input-group-icon">
                  <i class="fas fa-lock"></i>
                  <input type="password" name="confirm_password" id="confirmPasswordInput"
                         class="form-control form-control-lg"
                         placeholder="Repeat your new password" required>
                  <button type="button" class="btn-eye" onclick="togglePassword('confirmPasswordInput', this)">
                    <i class="fas fa-eye"></i>
                  </button>
                </div>
                <div class="mt-1" id="matchFeedback"></div>
              </div>

              <button type="submit" class="btn btn-primary btn-lg w-100">
                <i class="fas fa-check me-2"></i>Reset Password
              </button>
            </form>
          </div>
        </div>

        <div class="text-center mt-3">
          <a href="{{ url_for('auth.login') }}" class="text-muted small">
            <i class="fas fa-arrow-left me-1"></i>Back to Login
          </a>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block footer %}{% endblock %}

{% block extra_js %}
<script>
// Password strength meter
document.getElementById('passwordInput').addEventListener('input', function () {
  const val = this.value;
  const bar = document.getElementById('strengthBar');
  let strength = 0;
  if (val.length >= 6) strength++;
  if (val.length >= 10) strength++;
  if (/[A-Z]/.test(val)) strength++;
  if (/[0-9]/.test(val)) strength++;
  if (/[^A-Za-z0-9]/.test(val)) strength++;
  const colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e', '#16a34a'];
  const widths = ['0%', '20%', '40%', '60%', '80%', '100%'];
  bar.style.width = widths[strength];
  bar.style.backgroundColor = colors[strength];
});

// Match check
const pw = document.getElementById('passwordInput');
const cpw = document.getElementById('confirmPasswordInput');
const fb = document.getElementById('matchFeedback');
function checkMatch() {
  if (!cpw.value) { fb.innerHTML = ''; return; }
  if (pw.value === cpw.value) {
    fb.innerHTML = '<small class="text-success"><i class="fas fa-check me-1"></i>Passwords match</small>';
  } else {
    fb.innerHTML = '<small class="text-danger"><i class="fas fa-times me-1"></i>Passwords do not match</small>';
  }
}
pw.addEventListener('input', checkMatch);
cpw.addEventListener('input', checkMatch);
</script>
{% endblock %}
